# netlify.toml

# Configuración base de construcción del sitio.
[build]
  # Le dice a Netlify dónde encontrar las funciones del servidor.
  functions = "netlify/functions/"

# Redirección específica y segura para nuestra API.
[[redirects]]
  from = "/api/gemini"
  to = "/.netlify/functions/gemini-proxy"
  status = 200
  force = true

# ============================================================
# CACHE HEADERS — assets estáticos con versión: 1 año
# ============================================================

# Imágenes: cache 1 año (inmutables, se reemplazan con nuevo nombre)
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS con versión (?v=): 1 año
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS con versión (?v=): 1 año
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Rules / chatbot-rules.js
[[headers]]
  for = "/rules/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fuentes y manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTML principal: siempre revalidar
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
