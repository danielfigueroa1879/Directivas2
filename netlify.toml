# netlify.toml

# Configuración base de construcción del sitio.
[build]
  # Le dice a Netlify dónde encontrar las funciones del servidor.
  functions = "netlify/functions/"

# ============================================================
# PLUGIN INDEXNOW — notifica a Bing tras cada deploy exitoso
# ============================================================
[[plugins]]
  package = "./netlify/plugins/indexnow"

  # URLs a notificar. Puedes agregar más a medida que el sitio crezca.
  # También se puede sobreescribir en runtime con la env var INDEXNOW_URLS
  # (lista separada por coma) configurada desde el panel de Netlify.
  [plugins.inputs]
    host = "os10coquimbo.netlify.app"
    key = "c2918e58ba2b45d7bbc4105d84c3ce17"
    urls = [
      "https://os10coquimbo.netlify.app/"
    ]

# Redirección específica y segura para nuestra API.
[[redirects]]
  from = "/api/gemini"
  to = "/.netlify/functions/gemini-proxy"
  status = 200
  force = true

# ============================================================
# CACHE HEADERS — assets estáticos con versión: 1 año
# ============================================================

# Imágenes: cache 1 año (inmutables, se reemplazan con nuevo nombre)
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS con versión (?v=): 1 año
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS con versión (?v=): 1 año
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Rules / chatbot-rules.js
[[headers]]
  for = "/rules/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fuentes y manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# Digital Asset Links para TWA (Trusted Web Activity / APK)
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=86400"

# HTML principal: siempre revalidar
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
